name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  smoke:
    name: Build & smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic dataset
        run: python data/generate_data.py

      - name: Byte-compile Python sources (smoke check)
        run: python -m py_compile app.py route_optimizer.py data/generate_data.py

      - name: Guard against real / branded data
        run: |
          # Pattern is assembled from fragments so this workflow file does not
          # itself contain the literal token it searches for (avoids self-match).
          brand="dan""one"
          if grep -riIl "$brand" . \
              --exclude-dir=.git --exclude-dir=.venv --exclude-dir=.github; then
            echo "::error::Found a branded reference — the published repo must be fully de-branded."
            exit 1
          fi
          if ls Datos*.csv >/dev/null 2>&1; then
            echo "::error::A raw source dataset (Datos*.csv) must never be committed."
            exit 1
          fi
          echo "OK: no branded references and no raw source dataset present."
